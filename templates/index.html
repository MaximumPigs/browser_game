<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chicken Farm</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <main class="game">
      <h1>🐔 Chicken Farm</h1>

<pre id="chicken" class="chicken-art" aria-hidden="true">
        _
      _( )_
     ( o   )>
      (___)
      /   \
     |     |
     '-----'
</pre>

      <p class="chickens"><span id="chickens">0</span> 🐔</p>
      <p class="rate"><span id="per-second">0</span>/sec &middot; +<span id="per-click">1</span>/collect</p>
      <p class="ticker" id="ticker"></p>

      <div class="controls">
        <div class="collect-area">
          <button id="collect-btn" type="button" class="collect">Collect a chicken</button>
        </div>
      </div>

      <section class="shop">
        <h2>Upgrades</h2>
        <ul id="shop-list"></ul>
      </section>

      <button id="reset-btn" type="button" class="secondary">Reset farm</button>
    </main>

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
