name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: vitest (game logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Run Vitest
        run: npm test
