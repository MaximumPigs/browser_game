<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fish Box</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="static/css/style.css" />
  </head>
  <body>
    <main class="box">
      <h1 id="title">Fish Box</h1>

      <!-- Resource readout ("fish" is a quiet clickable clue) -->
      <p class="resources">
        You have <span id="fish">0</span> <span id="fish-word" class="clue">fish</span>.<span id="tins-wrap" class="hidden">
        You have <span id="tins">0</span> tins.</span>
      </p>

      <!-- Flavour ticker + ambient clickable events (the bobbing bottle) -->
      <p class="flavour" id="flavour"></p>
      <p class="tide"><span id="tide-bottle" class="clue hidden"></span></p>

      <!-- Tabs (revealed as the game opens up) -->
      <nav class="tabs" id="tabs">
        <button type="button" class="tab" data-panel="sea" id="tab-sea">The Sea</button>
        <button type="button" class="tab hidden" data-panel="shop" id="tab-shop">Shop</button>
        <button type="button" class="tab hidden" data-panel="adventure" id="tab-adventure">The Docks</button>
      </nav>

      <!-- The Sea (main) -->
      <section class="panel" id="panel-sea">
        <div class="actions">
          <button type="button" id="eat-btn" class="hidden">Eat all your fish (raw)</button>
          <button type="button" id="can-btn" class="hidden">Can (10) fish</button>
        </div>
        <p class="pier-clue"><span id="pier-clue" class="clue hidden"></span></p>
        <p class="whisper" id="whisper"></p>
      </section>

      <!-- Shop -->
      <section class="panel hidden" id="panel-shop">
        <p class="shop-intro">The dockside market. The shopkeeper eyes you.</p>
        <ul class="shop-list" id="shop-list"></ul>
      </section>

      <!-- Adventure -->
      <section class="panel hidden" id="panel-adventure">
        <div id="adventure-intro">
          <p id="adventure-desc">The planks creak. Something skitters at the far end.</p>
          <button type="button" id="enter-btn">Enter The Docks</button>
        </div>
        <div id="arena-wrap" class="hidden">
          <div class="arena-stage" id="arena-stage">
            <div id="arena" class="arena" tabindex="0" aria-label="combat arena"></div>
            <div id="arena-fx" class="arena-fx" aria-hidden="true"></div>
          </div>
          <div class="combat-hud">
            <div class="hpbar hpbar-player" id="player-hpbar">
              <span class="hpbar-fill" id="player-hpfill"></span>
              <span class="hpbar-text">you <span id="player-hp">0</span>/<span id="player-maxhp">0</span></span>
            </div>
            <div class="hpbar hpbar-enemy hidden" id="target-hpbar">
              <span class="hpbar-fill" id="target-hpfill"></span>
              <span class="hpbar-text" id="target-text"></span>
            </div>
            <p class="combat-meta">
              tins <span id="combat-tins">0</span> &middot; tonics <span id="combat-tonics">0</span>
            </p>
          </div>
          <p class="combat-log" id="combat-log">&nbsp;</p>
          <p class="controls-hint">
            move: WASD/arrows &middot; attack: Space/J &middot; block: K/Shift
            &middot; throw tin: L &middot; tonic: H
          </p>
        </div>
      </section>

      <footer class="footer">
        <button type="button" id="reset-btn" class="secondary">Start over</button>
        <span class="credits" id="credits">a tin of nothing</span>
      </footer>
    </main>

    <script type="module" src="static/js/main.js"></script>
  </body>
</html>
